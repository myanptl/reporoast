<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        display: flex; flex-direction: column; justify-content: space-between;
        padding: 76px 84px;
        font-family: "Bricolage Grotesque", sans-serif; color: #f6ece2;
        background: #2b0f14;
      }
      .brand { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 24px; color: #d6b3a8; letter-spacing: 0.16em; text-transform: uppercase; display: flex; align-items: center; gap: 14px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; background: #f5c14e; }
      h1 { font-size: 118px; font-weight: 800; line-height: 0.96; letter-spacing: -0.04em; }
      .gold { color: #f5c14e; }
      .row { display: flex; align-items: center; justify-content: space-between; }
      p { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 27px; color: #d6b3a8; }
      .pill { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 23px; color: #2b0f14; background: #f5c14e; padding: 13px 26px; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div class="brand"><span class="dot"></span> RepoRoast</div>
    <h1>Get your GitHub<br /><span class="gold">roasted</span>.</h1>
    <div class="row">
      <p>An AI roasts your repos — then hypes you back up.</p>
      <span class="pill">reporoast.vercel.app</span>
    </div>
  </body>
</html>
